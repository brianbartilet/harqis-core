name: HARQIS-CORE Unit Tests

# Trigger the workflow on push or pull request to the main branch
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Set Up Git Repository
      uses: actions/checkout@v2

    - name: Build Docker
      run: docker build . -t harqis-core --target base
      env:
        ENV_ROOT_DIRECTORY: /app

    - name: Run Unit Tests
      run: docker run -v app_volume:/app/data harqis-core

  trigger-harqis-work-tests:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]' && github.actor != 'dependabot-preview[bot]'
    steps:
      - name: Trigger harqis-work Tests
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${{ secrets.HARQIS_TOKEN }}" \
            https://api.github.com/repos/brianbartilet/harqis-work/actions/workflows/run_tests.yml/dispatches \
            -d '{"ref":"main"}'

  trigger-demo-project-build:
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]' && github.actor != 'dependabot-preview[bot]'
    steps:
      - name: Trigger Build
        uses: peter-evans/repository-dispatch@v1
        with:
          token: ${{ secrets.HARQIS_TOKEN }}
          repository: brianbartilet/harqis-demo-generic-framework
          event-type: trigger-harqis-demo-test